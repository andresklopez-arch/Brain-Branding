<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Burritos Zamoranos Hermanos Gómez</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <img src="logo.png" alt="Burritos Zamoranos" class="logo-login" onerror="this.src='https://placehold.co/180x120/f25c05/ffffff?text=Burritos+Zamoranos'">
      
      <!-- Sección de Login Normal -->
      <div id="login-section">
        <h2>Ingreso al Sistema</h2>
        <p>Introduce tus credenciales para acceder</p>
        
        <form id="login-form">
          <div class="form-group">
            <label for="username">Usuario</label>
            <select id="username" class="form-control" style="appearance: auto; padding: 14px 16px;" required autofocus>
              <option value="" disabled selected>Cargando usuarios...</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
            Ingresar
          </button>
        </form>
        <div id="login-error" style="color: var(--accent-red); font-size: 0.9rem; margin-top: 16px; display: none;"></div>
      </div>

      <!-- Sección de Cambio de Contraseña Obligatorio -->
      <div id="change-pwd-section" style="display: none;">
        <h2>Cambio de Contraseña</h2>
        <p style="color: var(--accent-orange); font-weight: 600;">Por motivos de seguridad, debes actualizar tu contraseña inicial ("1111") antes de continuar.</p>
        
        <form id="change-pwd-form">
          <div class="form-group">
            <label for="new-password">Nueva Contraseña</label>
            <input type="password" id="new-password" class="form-control" placeholder="Min. 4 caracteres" required>
          </div>
          
          <div class="form-group">
            <label for="confirm-password">Confirmar Contraseña</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Confirmar contraseña" required>
          </div>
          
          <button type="submit" class="btn btn-success" style="margin-top: 10px;">
            Actualizar Contraseña
          </button>
          <button type="button" class="btn btn-secondary" onclick="skipPasswordChange()" style="margin-top: 10px;">
            Cambiar después (Ingresar)
          </button>
        </form>
        <div id="change-pwd-error" style="color: var(--accent-red); font-size: 0.9rem; margin-top: 16px; display: none;"></div>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
  <script>
    const loginForm = document.getElementById('login-form');
    const loginSection = document.getElementById('login-section');
    const changePwdSection = document.getElementById('change-pwd-section');
    const changePwdForm = document.getElementById('change-pwd-form');
    
    const loginError = document.getElementById('login-error');
    const changePwdError = document.getElementById('change-pwd-error');
    
    let tempUsername = ''; // Guardar usuario temporalmente durante cambio de contraseña
    let tempRole = '';

    // Manejar Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.style.display = 'none';
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        
        if (!response.ok) {
          loginError.textContent = data.error || 'Ocurrió un error al ingresar.';
          loginError.style.display = 'block';
          return;
        }

        // Si login tiene éxito
        const user = data.user;
        if (user.mustChangePassword) {
          // Cambiar de vista para forzar cambio de contraseña
          tempUsername = user.username;
          tempRole = user.role;
          loginSection.style.display = 'none';
          changePwdSection.style.display = 'block';
        } else {
          // Guardar sesión y redirigir
          saveUserSession(user);
          redirectByRole(user.role);
        }
      } catch (err) {
        console.error(err);
        loginError.textContent = 'Error de conexión con el servidor.';
        loginError.style.display = 'block';
      }
    });

    // Manejar cambio de contraseña
    changePwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      changePwdError.style.display = 'none';

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword.length < 4) {
        changePwdError.textContent = 'La contraseña debe tener al menos 4 caracteres.';
        changePwdError.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        changePwdError.textContent = 'Las contraseñas no coinciden.';
        changePwdError.style.display = 'block';
        return;
      }

      if (newPassword === '1111') {
        changePwdError.textContent = 'No puedes usar la contraseña por defecto ("1111").';
        changePwdError.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: tempUsername, newPassword })
        });

        const data = await response.json();

        if (!response.ok) {
          changePwdError.textContent = data.error || 'Error al cambiar la contraseña.';
          changePwdError.style.display = 'block';
          return;
        }

        // Autenticar automáticamente tras cambiar contraseña exitosamente
        const loginResponse = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: tempUsername, password: newPassword })
        });
        const loginData = await loginResponse.json();

        if (loginResponse.ok) {
          saveUserSession(loginData.user);
          redirectByRole(loginData.user.role);
        } else {
          // Si por alguna razón falla, recargar para login normal
          window.location.reload();
        }
      } catch (err) {
        console.error(err);
        changePwdError.textContent = 'Error de conexión.';
        changePwdError.style.display = 'block';
      }
    });

    // Omitir cambio de contraseña temporalmente
    function skipPasswordChange() {
      const user = { username: tempUsername, role: tempRole, mustChangePassword: true };
      saveUserSession(user);
      redirectByRole(user.role);
    }

    // Redirección de rol
    function redirectByRole(role) {
      if (role === 'Administrador' || role === 'Gerente') {
        window.location.href = 'caja.html'; // Tienen acceso a todo, Caja es el dashboard
      } else if (role === 'Cajero') {
        window.location.href = 'caja.html';
      } else if (role === 'Cocina') {
        window.location.href = 'cocina.html';
      } else if (role === 'Mesero') {
        window.location.href = 'mesero.html';
      }
    }

    // Cargar lista de usuarios en el dropdown
    async function loadUserDropdown() {
      try {
        const response = await fetch('/api/users');
        const users = await response.json();
        const select = document.getElementById('username');
        select.innerHTML = '<option value="" disabled selected>Selecciona tu usuario...</option>';
        
        users.forEach(u => {
          const option = document.createElement('option');
          option.value = u.username;
          option.textContent = `${u.username} (${u.role})`;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error al cargar lista de usuarios:', err);
        const select = document.getElementById('username');
        select.innerHTML = '<option value="" disabled>Error al cargar usuarios</option>';
      }
    }

    // Verificar si ya tiene sesión activa al entrar
    const currentSession = loadUserSession();
    if (currentSession) {
      redirectByRole(currentSession.role);
    } else {
      // Si no hay sesión, cargar la lista de usuarios en el select
      loadUserDropdown();
    }
  </script>
</body>
</html>
